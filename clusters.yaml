# Platform cluster configuration
# Each team defines their clusters, repo, and chart path here.
# Add/remove entries and run `terraform apply` to reconcile.

teams:
  - name: bestversion
    repo: https://github.com/rui-armada/bestversion.git
    chart_path: charts/bestversion
    branch: main
    environments:
      - name: prod

