apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: castai
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://castai.github.io/helm-charts
    chart: castai-agent
    targetRevision: 0.75.0
    helm:
      releaseName: castai-agent
      values: |
        apiKey: ""
        clusterID: ""
  destination:
    server: https://kubernetes.default.svc
    namespace: castai-agent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
